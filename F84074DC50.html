<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Verificación de certificado - FICDE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background:#f4f6f9; font-family: Arial, sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; }
    .card { background:white; border-radius:12px; padding:24px 28px; max-width:420px; width:90%; box-shadow:0 10px 30px rgba(0,0,0,0.08); border-top:5px solid #1b305b; }
    h1 { margin:0 0 8px 0; color:#1b305b; font-size:26px; text-align:center; }
    .estado { margin:10px 0 20px 0; padding:10px 14px; border-radius:8px; background:#e8f5e9; color:#2e7d32; font-weight:bold; text-align:center; }
    .field { margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid #eee; }
    .label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#777; display:block; margin-bottom:4px; }
    .value { font-size:15px; font-weight:600; color:#1b305b; }
    .footer { margin-top:14px; text-align:center; font-size:11px; color:#666; }
  </style>
</head>
<body>
  <div class="card">
    <h1>FICDE</h1>
    <div class="estado">Certificado válido</div>
    <div class="field"><span class="label">Titular</span><span class="value">JUAN PEREZ</span></div>
    <div class="field"><span class="label">Documento</span><span class="value">45123456</span></div>
    <div class="field"><span class="label">Capacitación</span><span class="value" style="color:#f37021;">AGENTE DE TURISMO</span></div>
    <div class="field"><span class="label">Código de verificación</span><span class="value">F84074DC50</span></div>
    <div class="footer">Verificación en línea - Córdoba, Argentina<br><a href="https://www.ficde.org" target="_blank">www.ficde.org</a></div>
  </div>
</body>
</html>
